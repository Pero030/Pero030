<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pero030</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  /* HINTERGRUND (GARANTIERT FUNKTIONIERT) */
  background-image: 
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.85)),
    url("./Hintergrund.png");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height: 100vh;

  color: white;
  text-align: center;
}

/* Container */
.container {
  padding: 60px 20px;
  backdrop-filter: blur(6px);
}

/* Profilbild */
.profile {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  margin-bottom: 20px;
  box-shadow: 0 0 25px #00ffcc;
}

/* Name */
h1 {
  color: #00ffcc;
  font-size: 38px;
  text-shadow: 
    0 0 10px #00ffcc,
    0 0 20px #00ffcc,
    0 0 40px #00ffcc;
  margin-bottom: 10px;
  animation: glow 2s infinite;
}

/* Glow Animation */
@keyframes glow {
  0% { text-shadow: 0 0 10px #00ffcc; }
  50% { text-shadow: 0 0 30px #00ffcc; }
  100% { text-shadow: 0 0 10px #00ffcc; }
}

/* Text */
p {
  opacity: 0.85;
  margin-bottom: 30px;
}

/* Buttons */
.link {
  display: block;
  margin: 15px auto;
  padding: 15px;
  max-width: 300px;
  background: rgba(0, 0, 0, 0.6);
  color: #00ffcc;
  text-decoration: none;
  border-radius: 12px;
  border: 1px solid #00ffcc55;
  backdrop-filter: blur(8px);
  transition: 0.3s;
  font-weight: bold;
}

/* Hover */
.link:hover {
  background: #00ffcc;
  color: black;
  box-shadow: 0 0 25px #00ffcc;
  transform: scale(1.07);
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <img src="Pero_logo.png" class="profile">

  <!-- NAME -->
  <h1>Pero030 🎤</h1>

  <!-- TEXT -->
  <p>Emotionaler Deutschrap</p>

  <!-- LINKS -->
  <a class="link" href="#">🎵 Spotify (bald)</a>
  <a class="link" href="#">🎬 YouTube</a>
  <a class="link" href="#">🎤 TikTok</a>

</div>

</body>
</html>
