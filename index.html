<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pero030</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;

  background-image: 
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.85)),
    url("./Hintergrund.png");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  color: white;
  text-align: center;
}

/* Container */
.container {
  backdrop-filter: blur(6px);
  padding: 40px 20px;
}

/* Logo */
.profile {
  width: 180px;
  margin: 0 auto 25px auto;
  border-radius: 25px;
  overflow: hidden;

  box-shadow: 
    0 0 30px #00ffcc,
    0 0 60px #ff00ff;
}

.profile img {
  width: 100%;
  height: auto;
  display: block;
}

/* Name */
h1 {
  font-size: 48px;
  color: #00ffcc;

  text-shadow: 
    0 0 10px #00ffcc,
    0 0 30px #00ffcc,
    0 0 60px #00ffcc;

  margin-bottom: 10px;
}

/* Beschreibung */
p {
  font-size: 18px;
  opacity: 0.85;
  margin-bottom: 30px;
}

/* Buttons */
.link {
  display: block;
  margin: 15px auto;
  padding: 18px;
  max-width: 350px;

  background: rgba(0, 0, 0, 0.6);
  color: #00ffcc;
  text-decoration: none;
  border-radius: 12px;
  border: 1px solid #00ffcc55;

  backdrop-filter: blur(8px);
  transition: 0.3s;
  font-weight: bold;
  font-size: 18px;
}

/* Hover */
.link:hover {
  background: #00ffcc;
  color: black;
  box-shadow: 0 0 25px #00ffcc;
  transform: scale(1.07);
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGO -->
  <div class="profile">
    <img src="Pero_logo.png">
  </div>

  <!-- NAME -->
  <h1>Pero030 🎤</h1>

  <!-- TEXT -->
  <p>Emotionaler Deutschrap</p>

  <!-- LINKS -->
  <a class="link" href="#">🎵 Spotify (bald)</a>
  <a class="link" href="https://www.youtube.com/@Pero030">🎬 YouTube</a>
  <a class="link" href="https://www.tiktok.com/@pero030" target="_blank">🎤 TikTok</a>

</div>

</body>
</html>
