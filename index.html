<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pero030</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: 
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.95)),
    url("Hintergrund.png");
    
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height: 100vh;
  
  color: white;
  text-align: center;
}

.container {
  padding: 60px 20px;
}

h1 {
  color: #00ffcc;
  font-size: 38px;
  text-shadow: 0 0 20px #00ffcc;
}

p {
  opacity: 0.8;
  margin-bottom: 30px;
}

.profile {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  margin-bottom: 20px;
  border: 2px solid #00ffcc;
}

.link {
  display: block;
  margin: 15px auto;
  padding: 15px;
  max-width: 300px;
  background: #0f1414;
  color: #00ffcc;
  text-decoration: none;
  border-radius: 12px;
  border: 1px solid #00ffcc33;
  transition: 0.3s;
}

.link:hover {
  background: #00ffcc;
  color: black;
  box-shadow: 0 0 25px #00ffcc;
  transform: scale(1.05);
}

.container {
  padding: 60px 20px;
  backdrop-filter: blur(6px);
}
</style>
</head>

<body>

<div class="container">

  <img class="profile" src="https://via.placeholder.com/100" alt="Profil">

  <h1>Pero030 🎤</h1>
  <p>Emotionaler Deutschrap</p>

  <a class="link" href="#">🎵 Spotify (bald)</a>
  <a class="link" href="#">🎬 YouTube</a>
  <a class="link" href="#">🎤 TikTok</a>

</div>

</body>
</html>
